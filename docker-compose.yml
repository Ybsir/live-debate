# 本地或单机一键启动：后端(8000) + 网关(8080)
# 用法：在仓库根目录执行  docker compose up --build
# 前端 H5 需在 HBuilderX 构建后单独部署静态资源，或使用内网穿透访问本机 dev 服务

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/live-gateway-main/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ADMIN_STATIC_ROOT=/app/static-assets
    depends_on:
      - backend
    restart: unless-stopped
